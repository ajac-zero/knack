name: Publish binaries

on:
  push:
    tags:
      - 'knack-v*'
      - 'knack-registry-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: github.repository_owner == 'ajac-zero'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            command: cargo build --release
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            command: cross build --release
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            command: cargo build --release
          - os: macos-latest
            target: aarch64-apple-darwin
            command: cargo build --release
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            command: cargo build --release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: matrix.cross
        with:
          tool: cross

      - name: Select package and version
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            knack-v*) package=knack ;;
            knack-registry-v*) package=knack-registry ;;
            *) exit 1 ;;
          esac
          version="${RELEASE_TAG#"$package-v"}"
          printf 'name=%s\nversion=%s\n' "$package" "$version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: ${{ matrix.command }} -p ${{ steps.package.outputs.name }} --target ${{ matrix.target }}

      - name: Package archive and checksum
        shell: bash
        env:
          PACKAGE: ${{ steps.package.outputs.name }}
          VERSION: ${{ steps.package.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          binary="$PACKAGE"
          if [ "$RUNNER_OS" = Windows ]; then binary="$binary.exe"; fi
          archive="$PACKAGE-$VERSION-$TARGET.tar.gz"
          tar -czf "$archive" -C "target/$TARGET/release" "$binary"
          if command -v sha256sum >/dev/null; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}-${{ matrix.target }}.tar.gz
            ${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.repository_owner == 'ajac-zero'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release-assets/*
