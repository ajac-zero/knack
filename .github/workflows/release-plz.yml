name: Release-plz

on:
  push:
    branches: [main]

permissions:
  actions: write
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ajac-zero' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Build release binaries
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          echo "$RELEASES" | jq -r '.[] | select(.package_name == "knack" or .package_name == "knack-registry") | .tag' \
            | while IFS= read -r tag; do
                gh workflow run publish-binaries.yml --ref main -f "tag=$tag"
              done

      - name: Publish registry image
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          echo "$RELEASES" | jq -r '.[] | select(.package_name == "knack-registry") | .tag' \
            | while IFS= read -r tag; do
                gh workflow run publish-registry-image.yml --ref main -f "tag=$tag"
              done
