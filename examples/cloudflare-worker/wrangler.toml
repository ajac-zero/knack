name = "knack-registry-public"
main = "worker.js"
compatibility_date = "2025-01-01"

# Bind the R2 bucket where the static snapshot lives. After running
# `knack-registry build-static --output ./dist`, upload ./dist's
# contents into this bucket (preserving the `skills/` subdirectory).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "knack-registry-public"
# preview_bucket_name = "knack-registry-public-preview"  # optional, for `wrangler dev`

# Optional: route the worker at a custom domain. Set up the route in
# Cloudflare's dashboard or via `wrangler.toml`'s [[routes]] block.
# Below is the route used by the ajac-zero deployment of this repo;
# swap the pattern for your own domain when forking.
#
# [[routes]]
# pattern = "knack.ajac-zero.com"
# custom_domain = true
