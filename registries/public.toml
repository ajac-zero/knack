# ======================================================================
# Tier 2 — vendor-official, larger volume
# ======================================================================
# These bring a lot of skills each. We trust the org but the high count
# means heavier registry refresh cost and a noisier search experience;
# they're separated so operators running a smaller registry can comment
# out the whole section.

