# Public knack registry — curated source list
#
# This file is the authoritative input to the public knack registry
# instance maintained by the knack project. Mirror it for your own
# registry, or fork & extend with internal sources:
#
#   knack-registry --index registries/public.toml --name knackpub \
#                  --refresh-interval-seconds 3600 --bind 0.0.0.0:7349
#
# `gh:` sources resolve directly against github.com and need no
# operator-configured --source-alias.
#
# ----------------------------------------------------------------------
# Curation criteria (in roughly decreasing weight)
# ----------------------------------------------------------------------
#   1. Vendor-official: published by the org whose product the skill
#      describes (anthropics, vercel, microsoft, supabase, etc.).
#   2. Named-individual with a public track record we can vouch for.
#   3. Distinct skills, not the same content cross-listed under
#      multiple accounts to inflate leaderboard positions.
#   4. Active maintenance — default branch updated in the last ~6
#      months. Stale repos can be removed at any time.
#
# Things we deliberately exclude:
#   - "awesome-*" curated link lists. They contain READMEs pointing
#     at other skills, not SKILL.md files, so they index nothing.
#   - Repos with suspiciously uniform install counts across multiple
#     accounts (cross-listing the same AI-media skills under three
#     different orgs to game the leaderboard).
#   - Repos with high GitHub star counts but no real usage signal.
#
# ----------------------------------------------------------------------
# Proposing a new source
# ----------------------------------------------------------------------
# Open a PR adding a [[source]] entry under the right tier section,
# alphabetically within the tier, with a one-line comment naming the
# skills it provides. Include in the PR body:
#   - Why the source meets the curation criteria above.
#   - Whether you're the maintainer of the source repo or someone
#     vouching for it from outside.
#   - Any subpath needed to avoid walking unrelated trees (e.g. a
#     monorepo's apps/ or packages/ directories).
#
# PRs that add curated link lists, inflated personal repos, or
# duplicate cross-listings will be declined. The bar is deliberately
# conservative while the ecosystem stabilizes; we'd rather index 200
# trustworthy skills than 5000 noisy ones.
#
# ======================================================================
# Tier 1 — vendor-official
# ======================================================================

